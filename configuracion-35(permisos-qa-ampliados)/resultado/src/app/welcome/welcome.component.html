<div class="welcome-container">
  <h1 class="title">DINO RUNNER</h1>
  <p class="subtitle">Chrome-style endless runner</p>
  
  <div class="instructions">
    <h2>How to Play</h2>
    <ul>
      <li>Press SPACE or UP ARROW to jump</li>
      <li>Double jump allowed! Jump again in mid-air</li>
      <li>Avoid the cacti obstacles</li>
      <li>Speed increases over time</li>
    </ul>
  </div>
  
  <button class="start-button" (click)="startGame()">START GAME</button>
</div>
