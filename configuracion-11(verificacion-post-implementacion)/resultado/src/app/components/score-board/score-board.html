<div class="score-board">
  <div class="score-board__item">
    <span class="score-board__label">PUNTUACIÓN</span>
    <span class="score-board__value">{{ score() }}</span>
  </div>
  <div class="score-board__item score-board__item--high">
    <span class="score-board__label">RÉCORD</span>
    <span class="score-board__value">{{ highScore() }}</span>
  </div>
</div>
