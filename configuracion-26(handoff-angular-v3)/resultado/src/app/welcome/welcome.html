<div class="welcome-container">
  <h1 class="title">DINO RUNNER</h1>
  <p class="subtitle">Press SPACE or ↑ to start</p>
  <div class="instructions">
    <p>🎮 Jump over obstacles</p>
    <p>🚀 Double jump allowed</p>
    <p>⚡ Speed increases over time</p>
  </div>
  <div class="score-display">
    <span class="label">HIGH SCORE</span>
    <span class="value">{{ highScore }}</span>
  </div>
  <button class="neon-button" (click)="onStart()">START GAME</button>
</div>
