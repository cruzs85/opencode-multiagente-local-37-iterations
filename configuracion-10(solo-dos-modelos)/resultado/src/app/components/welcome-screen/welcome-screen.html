<div class="welcome-container">
  <h1 class="title">🦖 Dino Runner</h1>
  
  <div class="instructions">
    <p>Salta los obstáculos para sobrevivir</p>
    <p>Presiona ESPACIO o haz clic para saltar</p>

    <p>La velocidad aumenta con el tiempo</p>
    <p>¡Intenta superar tu récord!</p>
  </div>
  
  <button class="start-button" (click)="startGame.emit()">Comenzar</button>
</div>
