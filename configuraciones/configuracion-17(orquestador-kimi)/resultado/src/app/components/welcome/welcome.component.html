<div class="welcome-screen">
  <div class="welcome-card">
    <h1 class="welcome-title">🦖 Dino Runner</h1>
    <p class="welcome-subtitle">¡El clásico juego del dinosaurio!</p>
    
    <div class="instructions">
      <h2>Cómo jugar</h2>
      <ul>
        <li>Presiona <strong>ESPACIO</strong> o <strong>CLICK</strong> para saltar</li>
        <li>Presiona dos veces para hacer un <strong>DOBLE SALTO</strong></li>
        <li>Esquiva los obstáculos que aparecen</li>
        <li>La velocidad aumenta con el tiempo</li>
        <li>¡Supera tu récord!</li>
      </ul>
    </div>
    
    <button class="start-button" (click)="onStartClick()" data-testid="start-button">
      ▶ JUGAR
    </button>
  </div>
</div>
