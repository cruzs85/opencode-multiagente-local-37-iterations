<div class="welcome-screen">
  <div class="welcome-screen__content">
    <h1 class="welcome-screen__title">Dino Runner</h1>
    <div class="welcome-screen__dino-icon">
      <div class="dino-icon"></div>
    </div>
    <p class="welcome-screen__instructions">
      ¡Ayuda al dinosaurio a esquivar los obstáculos!
    </p>
    <ul class="welcome-screen__rules">
      <li>Presiona <kbd>ESPACIO</kbd> o haz <strong>clic</strong> para saltar</li>
      <li>Puedes saltar <strong>dos veces</strong> seguidas (doble salto)</li>
      <li>La velocidad aumenta con el tiempo</li>
      <li>¡Consigue la máxima puntuación!</li>
    </ul>
    <button class="welcome-screen__button" (click)="onStart()">
      Comenzar
    </button>
  </div>
</div>
