<div class="game-container">
  <canvas #gameCanvas id="gameCanvas" width="800" height="400"></canvas>

  <div class="score-overlay">
    <div>Score: {{ Math.round(gameState().score) }}</div>
    <div>High Score: {{ Math.round(scoreService.highScore()) }}</div>
  </div>

  @if (gameState().isGameOver) {
    <div class="game-over-overlay">
      <div class="game-over-overlay__title">GAME OVER</div>
      <div class="game-over-overlay__score">Score: {{ Math.round(gameState().score) }}</div>
      <div class="game-over-overlay__score">High Score: {{ Math.round(scoreService.highScore()) }}</div>
      <button class="game-over-overlay__button" (click)="startGame()">Restart Game</button>
    </div>
  }
